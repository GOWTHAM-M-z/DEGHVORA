<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, rgba(128, 0, 128, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(128, 0, 128, 0.05) 0%, transparent 45%),
                #fafbfc;
        }

        .contact-section {
            padding: 100px 8%;
        }

        .contact-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .contact-form {
            flex: 1;
            min-width: 350px;
        }

        .subtitle {
            color: blueviolet;
            font-size: 18px;
            font-weight: 600;
        }

        .contact-form h1 {
            font-size: 52px;
            color: purple;
            margin: 15px 0;
            line-height: 1.2;
        }

        .contact-form p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 15px;
            outline: none;
            transition: .3s;
        }

        input:focus,
        textarea:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 10px rgba(124, 58, 237, .2);
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #555;
        }

        .checkbox input {
            width: auto;
            margin: 0;
        }

        button {
            background: purple;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: .3s;
        }

        button:hover {
            background: purple;
        }

        .contact-info {
            flex: 1;
            min-width: 350px;
        }

        .logo-box {
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            width: 100%;
            max-width: 350px;
            object-fit: contain;
        }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, .1);
        }

        .info-card h3 {
            color: purple;
            margin-bottom: 10px;
        }

        .info-card p {
            color: #555;
        }

        @media(max-width:768px) {

            .contact-container {
                flex-direction: column;
            }

            .row {
                flex-direction: column;
            }

            .contact-form h1 {
                font-size: 38px;
            }
        }

        /* NAVBAR */
        nav {
            background: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }


        .logo img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo h2 {
            color: #8a05a8;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #800080;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #800080;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* TOAST NOTIFICATIONS */
        .toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
            max-width: 400px;
            width: 90%;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(128, 0, 128, 0.15);
            padding: 16px 22px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(128, 0, 128, 0.08), 0 5px 15px rgba(0, 0, 0, 0.05);
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 500;
            pointer-events: auto;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast-success {
            border-left: 5px solid #800080;
        }

        .toast-error {
            border-left: 5px solid #ef4444;
        }

        .toast-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .toast-success .toast-icon {
            background: rgba(128, 0, 128, 0.1);
            color: #800080;
        }

        .toast-error .toast-icon {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .toast-message {
            flex-grow: 1;
            line-height: 1.4;
        }

        .toast-close {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .toast-close:hover {
            color: #555;
        }

        /* BUTTON LOADING STATE */
        button[disabled] {
            background: #a876a8 !important;
            cursor: not-allowed;
            position: relative;
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* SOCIAL ICONS */

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 40px 0;
        }

        .social-links a {
            text-decoration: none;
            transition: .3s;
        }

        .social-links a:hover {
            transform: scale(1.15);
        }

        .social-links svg {
            width: 42px;
            height: 42px;
        }

        .social-links a:hover {
            transform: translateY(-5px);
        }

        .social-links svg {
            width: 30px;
            height: 30px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }
    </style>
</head>

<body>

    <nav>

        <a href="index.html" class="logo">
            <img src="DEGHVORA LOGO.jpeg" alt="DEGHVORA Logo">
            <h2>DEGHVORA</h2>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="service page.html">Services</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

    </nav>

    <section class="contact-section">

        <div class="contact-container">

            <!-- Left Side Form -->
            <div class="contact-form">

                <span class="subtitle">Get In Touch</span>

                <h1>Let's Chat,<br>Reach Out to Us</h1>

                <p>
                    Have questions or feedback? We're here to help.
                    Send us a message and we'll respond as soon as possible.
                </p>

                <form id="contactForm">

                    <div class="row">
                        <input type="text" id="name" name="name" placeholder="Full Name" required>
                        <input type="email" id="email" name="email" placeholder="Email Address" required>
                    </div>

                    <div class="row">
                        <input type="text" id="phone" name="phone" placeholder="Phone Number (Optional)">
                        <input type="text" id="subject" name="subject" placeholder="Subject (Optional)">
                    </div>

                    <textarea id="message" name="message" rows="7" placeholder="Leave us a message" required></textarea>

                    <label class="checkbox">
                        <input type="checkbox" required>
                        I agree to our privacy policy
                    </label>

                    <button type="submit">Send Message</button>

                </form>

            </div>

            <!-- Right Side -->
            <div class="contact-info">

                <div class="logo-box">
                    <img src="DEGHVORA LOGO.jpeg" alt="Company Logo">
                </div>

                <div class="info-card">
                    <h3>Email</h3>
                    <p>deghvora@gmail.com</p>
                </div>

            </div>

        </div>

    </section>
    <div class="social-links">

        <!-- Instagram -->
        <a href="https://instagram.com/deghvora" target="_blank">

            <svg viewBox="0 0 24 24" fill="#E1306C">
                <path
                    d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zm8.88 1.12a.88.88 0 1 1 0 1.76.88.88 0 0 1 0-1.76zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z" />
            </svg>

        </a>

        <!-- WhatsApp -->
        <a href="https://whatsapp.com/channel/0029Vb7pPw496H4XuqRfAo2Y" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="#25D366">
                <path
                    d="M20.52 3.48A11.8 11.8 0 0 0 12.05 0C5.42 0 .02 5.4.02 12.03c0 2.12.55 4.18 1.6 6L0 24l6.16-1.6a11.96 11.96 0 0 0 5.89 1.5h.01c6.63 0 12.03-5.4 12.03-12.03 0-3.21-1.25-6.23-3.57-8.39zM12.06 21.9a9.9 9.9 0 0 1-5.04-1.38l-.36-.21-3.65.95.97-3.56-.24-.37a9.88 9.88 0 1 1 8.32 4.57zm5.43-7.42c-.3-.15-1.77-.87-2.04-.96-.27-.1-.47-.15-.67.15-.2.3-.77.96-.95 1.15-.17.2-.35.22-.65.08-.3-.15-1.27-.47-2.42-1.5-.89-.79-1.49-1.77-1.67-2.07-.17-.3-.02-.46.13-.61.14-.14.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.03-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.48-.5-.67-.51h-.57c-.2 0-.52.08-.8.37-.27.3-1.05 1.02-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.13 3.25 5.16 4.55.72.31 1.28.5 1.72.64.72.23 1.38.2 1.9.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z" />
            </svg>

        </a>

    </div>
    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const form = this;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.textContent;

            // Extract inputs
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();

            // Setup loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="btn-spinner"></span>Sending...';

            try {
                const response = await fetch('/contact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        subject,
                        message
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showToast(data.message || 'Message sent successfully!', 'success');
                    form.reset();
                } else {
                    showToast(data.error || 'Failed to send message. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                showToast('A connection error occurred. Please check your network and try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            const iconSvg = type === 'success'
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

            toast.innerHTML = `
            <div class="toast-icon">${iconSvg}</div>
            <div class="toast-message">${message}</div>
            <button class="toast-close">&times;</button>
        `;

            container.appendChild(toast);

            // Trigger animation frame
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            // Close button listener
            toast.querySelector('.toast-close').addEventListener('click', () => {
                removeToast(toast);
            });

            // Auto dismiss after 5 seconds
            setTimeout(() => {
                if (toast.parentNode) {
                    removeToast(toast);
                }
            }, 5000);
        }

        function removeToast(toast) {
            toast.classList.remove('show');
            toast.addEventListener('transitionend', () => {
                if (toast.parentNode) {
                    toast.remove();
                }
            });
        }
    </script>

</body>

</html>
