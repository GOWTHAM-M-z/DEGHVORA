<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>DEGHVORA - Projects</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at 80% 20%, rgba(128, 0, 128, 0.05) 0%, transparent 45%),
            radial-gradient(circle at 20% 80%, rgba(128, 0, 128, 0.05) 0%, transparent 45%),
            #fafbfc;
overflow:hidden;
}

/* NAVBAR */
nav{
    background: transparent;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    transition: transform 0.3s ease;
}


.logo img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
}

.logo h2{
    color:#8a05a8;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

.nav-links{
    display:flex;
    gap:35px;
    list-style:none;
    align-items:center;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-size:16px;
    font-weight:500;
    position:relative;
    transition: color 0.3s ease;
}

.nav-links a::after{
    content:'';
    position:absolute;
    bottom:-5px;
    left:0;
    width:0;
    height:2px;
    background: #800080;
    transition: width 0.3s ease;
}

.nav-links a:hover{
    color:#800080;
}

.nav-links a:hover::after{
    width:100%;
}


.hero{
padding:10px;
text-align:center;
height:15vh;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero span{
background:linear-gradient(
90deg,
purple
);

-webkit-background-clip:text;
color:transparent;
}

.project-container{
display:flex;
justify-content:center;
padding:20px;
}

.project-card{
width:1000px;
height:360px;
overflow:hidden;
border-radius:30px;
position:relative;
cursor:pointer;
box-shadow:0 15px 50px rgba(0,0,0,.1);
}

.project-card img{
width:100%;
height:100%;
object-fit:cover;
}

/* CHANGED PART ONLY */

.overlay{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;

background:rgba(255,255,255,.25);
backdrop-filter:blur(6px);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

opacity:1;

padding:30px;
text-align:center;

}

/* END CHANGED PART */

.overlay h2{
font-size:40px;
margin-bottom:15px;
}

.overlay p{
margin-bottom:20px;
max-width:600px;
text-align:center;
}

.view-btn{
padding:15px 35px;
border:none;
border-radius:40px;
background:black;
color:white;
cursor:pointer;

transition:.4s ease;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}
.view-btn:hover{

transform:translateY(-5px) scale(1.08);

background:linear-gradient(
90deg,

);

box-shadow:
0 15px 30px rgba(37,99,235,.4);

}



footer{
margin-top:10px;
padding:15px;
text-align:center;
}

</style>

</head>

<body>

<nav>

<a href="index.html" class="logo">
    <img src="DEGHVORA LOGO.jpeg" alt="DEGHVORA Logo">
    <h2>DEGHVORA</h2>
</a>

<div class="nav-links">
    <a href="index.html">Home</a>
    <a href="service page.html">Services</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</div>

</nav>

<section class="hero">

<h1>Our <span>Projects</span></h1>

<p>
Explore our creative and innovative projects.
</p>

</section>

<section class="project-container">

<div class="project-card">

<img src="https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=1200">

<div class="overlay">

<h2>Fake Review Detection System</h2>

<p>
AI powered review detection system built to identify fake reviews.
</p>

<a href="https://homecart-plum.vercel.app/" target="_blank">

<button class="view-btn">
👁 View Project
</button>

</a>

</div>

</div>

</section>

<footer>
<p>© 2026 DEGHVORA | Build Beyond Limits </p>
</footer>

</body>
</html>
